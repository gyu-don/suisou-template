# Edit the `app` service below to match your application: rename it,
# adjust the build context or image, add per-app volumes, and list the
# ports you want exposed on the `wg-client` service (the sandbox shares
# its network namespace, so ports are published there, not on `app`).
#
# The `wg-client` and `router` services are the suisou core: adopt them
# verbatim and avoid local modifications.  See AGENTS-suisou.md.

services:
  app:
    build:
      context: sandbox
    init: true
    restart: unless-stopped
    network_mode: "service:wg-client"
    volumes:
      - mitmproxy-ca:/mitmproxy-ca:ro
    depends_on:
      wg-client:
        condition: service_healthy

  wg-client:
    build:
      context: wg-client
    init: true
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    cap_drop:
      - ALL
    volumes:
      - mitmproxy-ca:/mitmproxy-ca:ro
    # Publish your application's ports here.  The sandbox container
    # shares this network namespace, so its listeners show up on
    # wg-client's interfaces.
    # ports:
    #   - "3000:3000"
    depends_on:
      router:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/wg-ready"]
      interval: 2s
      timeout: 5s
      retries: 30
    networks:
      - tunnel

  router:
    build:
      context: router
    init: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tunnel
      - external
    volumes:
      - mitmproxy-ca:/home/mitmproxy/.mitmproxy
      - ./router/config.toml:/etc/suisou/config.toml:ro
    healthcheck:
      test: ["CMD", "test", "-f", "/home/mitmproxy/.mitmproxy/wireguard.conf"]
      interval: 2s
      timeout: 5s
      retries: 30

volumes:
  mitmproxy-ca:

networks:
  tunnel:
    driver: bridge
  external:
    driver: bridge
