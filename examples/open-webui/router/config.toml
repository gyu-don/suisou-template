# --- Local LLM ---
# For a local LLM instance on the host (configure it in compose.override.yml).
# Uncomment the block matching your server and its default port.
#
# [services.ollama]
# endpoints = [
#   { domain = "host.docker.internal", allow_plain_http = true, ports = [11434] },
# ]
#
[services.llama-cpp]
endpoints = [
  { domain = "host.docker.internal", allow_plain_http = true, ports = [8080] },
]

[services.comfyui]
endpoints = [
  { domain = "host.docker.internal", allow_plain_http = true, ports = [8188] },
]

