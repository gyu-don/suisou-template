# ComfyUI router configuration
#
# This allowlist is tuned for ComfyUI with ComfyUI-Manager.
# Custom node installation requires GitHub (read-only) and registry.comfy.org;
# Python dependencies are resolved by pip / uv from PyPI.
#
# Model-hosting services (HuggingFace, CivitAI) are commented out — uncomment
# only the registries you actively use.

# --- GitHub ---
# Custom node repositories and dependency sources hosted on GitHub.
# POST is restricted to git-upload-pack (clone/fetch) so push is blocked.
[services.github]
endpoints = [
  { domain = "github.com",             methods = ["GET"] },
  { domain = "github.com",             methods = ["POST"], paths = ["/*/git-upload-pack"] },
  { domain = "*.github.com",           methods = ["GET"] },
  { domain = "*.githubusercontent.com", methods = ["GET"] },
]

# --- ComfyUI Registry ---
# ComfyUI-Manager queries this registry to browse and install custom nodes.
[services.comfyui-registry]
endpoints = [
  { domain = "registry.comfy.org", methods = ["GET", "POST"] },
]

# --- Python packages ---
# pip and uv download packages from PyPI, PyTorch, NVIDIA.
[services.pip]
endpoints = [
  { domain = "pypi.org",               methods = ["GET"] },
  { domain = "files.pythonhosted.org", methods = ["GET"] },
  { domain = "download*.pytorch.org", methods = ["GET"] },
  { domain = "pypi.nvidia.com",       methods = ["GET"] },
]

# --- uv ---
# uv fetches its own binaries and tool metadata from astral.sh.
[services.uv]
endpoints = [
  { domain = "astral.sh",   methods = ["GET"] },
  { domain = "*.astral.sh", methods = ["GET"] },
]

